<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Route Editor</title>
  <style>
    html, body { height: 100%; margin: 0; background: #000; color: #fff; font-family: sans-serif; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    nav.topbar { position: fixed; top: 0; left: 0; right: 0; height: 40px; display: flex; align-items: center; background: rgba(0,0,0,0.5); z-index: 10; padding: 0 10px; }
    nav.topbar a, nav.topbar button { color: #d4af37; margin-right: 10px; text-decoration: none; background: transparent; border: none; cursor: pointer; font: inherit; }
    nav.topbar button { padding: 4px 8px; border: 1px solid #d4af37; }
    .panel { position: absolute; top: 50px; left: 0; width: 250px; background: rgba(0,0,0,0.7); border-right: 2px solid #d4af37; padding: 10px; height: calc(100% - 50px); overflow-y: auto; }
    .panel.hidden { display: none; }
    .controls { position: absolute; top: 50px; left: 260px; background: rgba(0,0,0,0.5); padding: 10px; }
    .hidden-ui nav.topbar, .hidden-ui .panel, .hidden-ui .controls { display: none; }
    button, select, input { background: #111; color: #fff; border: 1px solid #d4af37; padding: 6px 10px; margin: 2px; }
    button.primary { background: #d4af37; color: #000; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a href="/index.html">iTaxi Finder</a>
    <a href="/index.html">Route Finder</a>
    <a href="/routes.html">Route Adder</a>
    <a href="/delivery.html">Delivery</a>
    <a href="/community/index.html">Community</a>
    <a href="/registration.html">Registration</a>
    <a href="/about.html">About</a>
    <button id="hideUi">Hide UI</button>
  </nav>

  <div id="helpPanel" class="panel hidden">
    <h2>Editing Routes</h2>
    <p>Click on the map to add points. Use Undo/Redo/Clear for path editing. Snap to Roads aligns the path to real streets.</p>
    <p>Select an existing route or enter a new ID and name. Save to persist.</p>
    <button id="closePanel">Close</button>
  </div>
  <button id="togglePanel" class="controls">Instructions</button>
  <div id="map"></div>
  <div class="controls" style="left:260px;">
    <select id="existingRoutes"></select>
    <div id="controls">
      <button type="button" id="undo">Undo</button>
      <button type="button" id="redo">Redo</button>
      <button type="button" id="clear">Clear</button>
      <button type="button" id="delete">Remove</button>
    </div>
    <form id="routeForm">
      <label>ID <input id="routeId" required /></label>
      <label>Name <input id="routeName" required /></label>
      <label>Frequency <input id="routeFreq" type="number" min="0" max="1" step="0.1" /></label>
      <button type="button" id="snap">Snap to Roads</button>
      <button type="submit" class="primary">Save</button>
      <button type="button" id="cancel">Cancel</button>
    </form>
  </div>

  <script src="routes.js"></script>
  <script src="loadGoogleMaps.js"></script>
</body>
</html>
