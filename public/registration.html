<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Registration</title>
  <style>
    html, body { height:100%; margin:0; background:#000; color:#fff; font-family:sans-serif; }
    #map { position:absolute; top:0; left:0; right:0; bottom:0; }
    nav.topbar { position:fixed; top:0; left:0; right:0; height:40px; display:flex; align-items:center; background:rgba(0,0,0,0.5); z-index:10; padding:0 10px; }
    nav.topbar a, nav.topbar button { color:#d4af37; margin-right:10px; text-decoration:none; background:transparent; border:none; cursor:pointer; font:inherit; }
    nav.topbar button { padding:4px 8px; border:1px solid #d4af37; }
    .form-panel { position:absolute; top:60px; left:10px; background:rgba(0,0,0,0.5); padding:10px; z-index:5; }
    .hidden-ui nav.topbar, .hidden-ui .form-panel { display:none; }
    input, select, button { background:#111; color:#fff; border:1px solid #d4af37; padding:6px 10px; margin:2px; }
    button.primary { background:#d4af37; color:#000; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a href="/index.html">iTaxi Finder</a>
    <a href="/index.html">Route Finder</a>
    <a href="/routes.html">Route Adder</a>
    <a href="/delivery.html">Delivery</a>
    <a href="/community/index.html">Community</a>
    <a href="/registration.html">Registration</a>
    <a href="/about.html">About</a>
    <button id="hideUi">Hide UI</button>
  </nav>
  <div id="map"></div>
  <div class="form-panel">
    <h2>Register</h2>
    <form>
      <label>Role
        <select id="role">
          <option>Collector</option>
          <option>Taxi Driver</option>
          <option>Spaza Owner</option>
          <option>Taxi Rank Depot</option>
          <option>Monthly Subscriber</option>
          <option>Taxi Owner</option>
        </select>
      </label><br/>
      <label>Name <input id="name" required></label><br/>
      <label>Email <input id="email" type="email"></label><br/>
      <label>Phone <input id="phone"></label><br/>
      <button type="submit" class="primary">Submit</button>
    </form>
  </div>

  <script src="registration.js"></script>
  <script src="loadGoogleMaps.js"></script>
  <script>
    document.getElementById('hideUi').addEventListener('click', ()=>{
      document.body.classList.toggle('hidden-ui');
    });
  </script>
</body>
</html>
